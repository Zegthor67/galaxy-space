<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galaxy 3D</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    canvas { display: block; }

    /* ── Control Panel ─────────────────────────────────────────── */
    #panel {
      position: fixed;
      top: 14px;
      right: 14px;
      width: 210px;
      background: rgba(4, 4, 16, 0.82);
      border: 1px solid rgba(90, 110, 230, 0.28);
      border-radius: 12px;
      padding: 14px 14px 12px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      color: #fff;
      font-size: 10.5px;
      z-index: 100;
      user-select: none;
    }

    #panel h2 {
      text-align: center;
      font-size: 10px;
      letter-spacing: 3.5px;
      color: #99b5ff;
      text-transform: uppercase;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(90, 110, 230, 0.25);
      margin-bottom: 12px;
    }

    .ctrl { margin-bottom: 9px; }

    .ctrl-hd {
      display: flex;
      justify-content: space-between;
      margin-bottom: 5px;
      color: #6e85bc;
    }

    .ctrl-hd .v { color: #aabfff; font-weight: 600; }

    /* Sliders */
    input[type=range] {
      width: 100%;
      height: 2px;
      appearance: none;
      -webkit-appearance: none;
      background: rgba(90, 110, 230, 0.35);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #5575ee;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(80, 120, 255, 0.9), 0 0 14px rgba(80, 120, 255, 0.4);
      transition: transform 0.1s;
    }
    input[type=range]::-webkit-slider-thumb:active { transform: scale(1.25); }

    /* Color row */
    .colors { display: flex; gap: 6px; }

    .color-field {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .color-field label {
      font-size: 9px;
      color: #6e85bc;
      text-align: center;
    }

    input[type=color] {
      width: 100%;
      height: 24px;
      border: 1px solid rgba(90, 110, 230, 0.35);
      border-radius: 5px;
      cursor: pointer;
      background: none;
      padding: 2px;
    }

    /* Separator */
    .sep {
      border: none;
      border-top: 1px solid rgba(90, 110, 230, 0.18);
      margin: 10px 0;
    }

    /* Regenerate button */
    #btn {
      width: 100%;
      margin-top: 4px;
      padding: 7px;
      background: linear-gradient(135deg, rgba(55,80,200,0.45), rgba(120,50,210,0.45));
      border: 1px solid rgba(100,130,255,0.38);
      border-radius: 6px;
      color: #b8ccff;
      font-size: 9.5px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    #btn:hover {
      background: linear-gradient(135deg, rgba(80,120,255,0.6), rgba(160,70,250,0.6));
      color: #e0eeff;
    }
    #btn:active { transform: scale(0.97); }

    /* Hint */
    #hint {
      margin-top: 9px;
      text-align: center;
      font-size: 8.5px;
      color: rgba(100, 120, 180, 0.6);
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

<!-- ── Panel ──────────────────────────────────────────────────── -->
<div id="panel">
  <h2>✦ Galaxy</h2>

  <div class="ctrl">
    <div class="ctrl-hd"><span>Branches</span><span class="v" id="v-branches">3</span></div>
    <input type="range" id="r-branches" min="1" max="10" step="1" value="3">
  </div>

  <div class="ctrl">
    <div class="ctrl-hd"><span>Rayon</span><span class="v" id="v-radius">5.0</span></div>
    <input type="range" id="r-radius" min="0.5" max="20" step="0.5" value="5">
  </div>

  <div class="ctrl">
    <div class="ctrl-hd"><span>Spin</span><span class="v" id="v-spin">1.0</span></div>
    <input type="range" id="r-spin" min="-5" max="5" step="0.1" value="1.0">
  </div>

  <div class="ctrl">
    <div class="ctrl-hd"><span>Aléatoire</span><span class="v" id="v-rand">0.30</span></div>
    <input type="range" id="r-rand" min="0" max="2" step="0.01" value="0.3">
  </div>

  <div class="ctrl">
    <div class="ctrl-hd"><span>Particules</span><span class="v" id="v-count">80k</span></div>
    <input type="range" id="r-count" min="1000" max="200000" step="1000" value="80000">
  </div>

  <hr class="sep">

  <div class="ctrl">
    <div class="ctrl-hd" style="margin-bottom:7px"><span>Dégradé de couleurs</span></div>
    <div class="colors">
      <div class="color-field">
        <label>Centre</label>
        <input type="color" id="c-inside"  value="#ff6030">
      </div>
      <div class="color-field">
        <label>Bord</label>
        <input type="color" id="c-outside" value="#1b3aaa">
      </div>
    </div>
  </div>

  <button id="btn">Régénérer</button>
  <p id="hint">Clic + glisser pour orbiter · Molette pour zoomer</p>
</div>

<!-- ── Three.js ────────────────────────────────────────────────── -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ═══════════════════════════════════════════════════════════════
   Scene / Renderer / Camera
═══════════════════════════════════════════════════════════════ */
const scene    = new THREE.Scene();
const camera   = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.01, 500);
camera.position.set(0, 5, 9);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const orbitControls = new OrbitControls(camera, renderer.domElement);
orbitControls.enableDamping  = true;
orbitControls.dampingFactor  = 0.06;
orbitControls.minDistance    = 0.5;
orbitControls.maxDistance    = 60;
orbitControls.target.set(0, 0, 0);

/* ═══════════════════════════════════════════════════════════════
   Sparkle Texture  (mimics the 4-ray star sparkle PNG)
═══════════════════════════════════════════════════════════════ */
function makeSparkleTexture() {
  const S   = 128;
  const cv  = document.createElement('canvas');
  cv.width  = cv.height = S;
  const ctx = cv.getContext('2d');
  const c   = S / 2;

  // ── Radial glow core
  const glow = ctx.createRadialGradient(c, c, 0, c, c, c);
  glow.addColorStop(0.00, 'rgba(255,255,255,1)');
  glow.addColorStop(0.05, 'rgba(255,255,255,1)');
  glow.addColorStop(0.18, 'rgba(255,255,255,0.7)');
  glow.addColorStop(0.40, 'rgba(255,255,255,0.18)');
  glow.addColorStop(0.70, 'rgba(255,255,255,0.04)');
  glow.addColorStop(1.00, 'rgba(255,255,255,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, S, S);

  // ── 4-point diamond spikes (cross + diagonal)
  const spike = (angle, len, hw) => {
    ctx.save();
    ctx.translate(c, c);
    ctx.rotate(angle);

    const g = ctx.createLinearGradient(0, -len, 0, len);
    g.addColorStop(0,    'rgba(255,255,255,0)');
    g.addColorStop(0.48, 'rgba(255,255,255,0.88)');
    g.addColorStop(0.5,  'rgba(255,255,255,1)');
    g.addColorStop(0.52, 'rgba(255,255,255,0.88)');
    g.addColorStop(1,    'rgba(255,255,255,0)');

    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.moveTo(0,   -len);
    ctx.lineTo( hw,  0);
    ctx.lineTo(0,    len);
    ctx.lineTo(-hw,  0);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  };

  // Main cross
  spike(0,              c * 0.98, 2.2);
  spike(Math.PI / 2,    c * 0.98, 2.2);
  // Diagonal — slightly shorter & thinner
  spike(Math.PI / 4,    c * 0.58, 1.3);
  spike(-Math.PI / 4,   c * 0.58, 1.3);

  // Small secondary glow ring
  ctx.globalCompositeOperation = 'lighter';
  const ring = ctx.createRadialGradient(c, c, c * 0.06, c, c, c * 0.28);
  ring.addColorStop(0,   'rgba(255,255,255,0.28)');
  ring.addColorStop(1,   'rgba(255,255,255,0)');
  ctx.fillStyle = ring;
  ctx.fillRect(0, 0, S, S);

  return new THREE.CanvasTexture(cv);
}

const starTex = makeSparkleTexture();

/* ═══════════════════════════════════════════════════════════════
   Galaxy Shader Material (supports per-vertex size)
═══════════════════════════════════════════════════════════════ */
const galaxyMaterial = new THREE.ShaderMaterial({
  uniforms: {
    uTexture:    { value: starTex },
    uPixelRatio: { value: Math.min(devicePixelRatio, 2) },
  },
  vertexShader: /* glsl */`
    attribute float aSize;
    attribute vec3  aColor;
    varying   vec3  vColor;
    uniform   float uPixelRatio;

    void main() {
      vColor = aColor;
      vec4 mvPos  = modelViewMatrix * vec4(position, 1.0);
      // world-space attenuation identical to THREE.PointsMaterial sizeAttenuation
      gl_PointSize = aSize * uPixelRatio * (250.0 / -mvPos.z);
      gl_Position  = projectionMatrix * mvPos;
    }
  `,
  fragmentShader: /* glsl */`
    uniform sampler2D uTexture;
    varying vec3 vColor;

    void main() {
      vec4 tex = texture2D(uTexture, gl_PointCoord);
      if (tex.a < 0.004) discard;
      gl_FragColor = vec4(vColor * tex.rgb, tex.a * 0.92);
    }
  `,
  transparent: true,
  depthWrite:  false,
  blending:    THREE.AdditiveBlending,
});

/* ═══════════════════════════════════════════════════════════════
   Parameters
═══════════════════════════════════════════════════════════════ */
const P = {
  count:        80000,
  branches:     3,
  radius:       5.0,
  spin:         1.0,
  randomness:   0.30,
  randomPower:  3.0,
  insideColor:  '#ff6030',
  outsideColor: '#1b3aaa',
};

/* ═══════════════════════════════════════════════════════════════
   Galaxy Generation
═══════════════════════════════════════════════════════════════ */
let galaxyMesh = null;
let galaxyGeo  = null;

function generateGalaxy() {
  // Dispose old
  if (galaxyMesh) {
    galaxyGeo.dispose();
    scene.remove(galaxyMesh);
  }

  galaxyGeo = new THREE.BufferGeometry();

  const pos    = new Float32Array(P.count * 3);
  const col    = new Float32Array(P.count * 3);
  const sizes  = new Float32Array(P.count);

  const cIn  = new THREE.Color(P.insideColor);
  const cOut = new THREE.Color(P.outsideColor);
  const cCore = new THREE.Color('#ffffff');

  const rand = (spread) =>
    Math.pow(Math.random(), P.randomPower) * spread * (Math.random() < 0.5 ? 1 : -1);

  for (let i = 0; i < P.count; i++) {
    const i3 = i * 3;

    // Radius — bias toward center for realistic density
    const r       = Math.pow(Math.random(), 0.65) * P.radius;
    const branch  = (i % P.branches) / P.branches * Math.PI * 2;
    const spinAng = r * P.spin;

    // Spread: less vertical than horizontal
    const spr = P.randomness * r;
    pos[i3    ] = Math.cos(branch + spinAng) * r + rand(spr);
    pos[i3 + 1] = rand(spr * 0.35);
    pos[i3 + 2] = Math.sin(branch + spinAng) * r + rand(spr);

    // Colour: lerp inside → outside, then add a white core flash
    const t = r / P.radius;
    const mc = cIn.clone().lerp(cOut, t);
    if (r < P.radius * 0.08) mc.lerp(cCore, (1 - t / 0.08) * 0.6);

    col[i3    ] = mc.r;
    col[i3 + 1] = mc.g;
    col[i3 + 2] = mc.b;

    // Size: bigger near center, tiny variation elsewhere
    sizes[i] = r < P.radius * 0.12
      ? (Math.random() * 0.08 + 0.10)   // bright core stars
      : (Math.random() * 0.04 + 0.02);  // regular particles
  }

  galaxyGeo.setAttribute('position', new THREE.BufferAttribute(pos,   3));
  galaxyGeo.setAttribute('aColor',   new THREE.BufferAttribute(col,   3));
  galaxyGeo.setAttribute('aSize',    new THREE.BufferAttribute(sizes, 1));

  galaxyMesh = new THREE.Points(galaxyGeo, galaxyMaterial);
  scene.add(galaxyMesh);
}

generateGalaxy();

/* ═══════════════════════════════════════════════════════════════
   Background star field (static tiny dots)
═══════════════════════════════════════════════════════════════ */
(function addStarField() {
  const N   = 6000;
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(N * 3);
  const col = new Float32Array(N * 3);
  const sz  = new Float32Array(N);

  for (let i = 0; i < N; i++) {
    const phi   = Math.acos(2 * Math.random() - 1);
    const theta = Math.random() * Math.PI * 2;
    const r     = 30 + Math.random() * 60;
    pos[i * 3    ] = r * Math.sin(phi) * Math.cos(theta);
    pos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
    pos[i * 3 + 2] = r * Math.cos(phi);
    const b = 0.55 + Math.random() * 0.45;
    col[i * 3    ] = b;
    col[i * 3 + 1] = b;
    col[i * 3 + 2] = b + Math.random() * 0.2;
    sz[i] = Math.random() * 0.015 + 0.006;
  }

  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('aColor',   new THREE.BufferAttribute(col, 3));
  geo.setAttribute('aSize',    new THREE.BufferAttribute(sz,  1));

  const mat = galaxyMaterial.clone();
  mat.uniforms.uTexture    = { value: starTex };
  mat.uniforms.uPixelRatio = { value: Math.min(devicePixelRatio, 2) };

  scene.add(new THREE.Points(geo, mat));
})();

/* ═══════════════════════════════════════════════════════════════
   UI Wiring
═══════════════════════════════════════════════════════════════ */
function wire(sliderId, valId, key, fmt) {
  const sl = document.getElementById(sliderId);
  const vl = document.getElementById(valId);
  sl.addEventListener('input', () => {
    const v = parseFloat(sl.value);
    P[key]  = v;
    vl.textContent = fmt ? fmt(v) : v;
  });
}

wire('r-branches', 'v-branches', 'branches',   v => Math.round(v));
wire('r-radius',   'v-radius',   'radius',     v => v.toFixed(1));
wire('r-spin',     'v-spin',     'spin',       v => v.toFixed(1));
wire('r-rand',     'v-rand',     'randomness', v => v.toFixed(2));
wire('r-count',    'v-count',    'count',
      v => v >= 1000 ? (v / 1000).toFixed(0) + 'k' : v);

document.getElementById('c-inside').addEventListener('input',  e => { P.insideColor  = e.target.value; });
document.getElementById('c-outside').addEventListener('input', e => { P.outsideColor = e.target.value; });
document.getElementById('btn').addEventListener('click', generateGalaxy);

/* ═══════════════════════════════════════════════════════════════
   Resize
═══════════════════════════════════════════════════════════════ */
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  galaxyMaterial.uniforms.uPixelRatio.value = Math.min(devicePixelRatio, 2);
});

/* ═══════════════════════════════════════════════════════════════
   Render Loop
═══════════════════════════════════════════════════════════════ */
const clock = new THREE.Clock();

(function animate() {
  requestAnimationFrame(animate);

  const t = clock.getElapsedTime();

  if (galaxyMesh) {
    // Slow galaxy rotation
    galaxyMesh.rotation.y = t * 0.04;
    // Gentle tilt oscillation
    galaxyMesh.rotation.x = Math.sin(t * 0.08) * 0.04;
  }

  orbitControls.update();
  renderer.render(scene, camera);
})();
</script>
</body>
</html>
