<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galaxy 3D</title>
  <link rel="stylesheet" href="style/panel.css" />
</head>
<body>

<!-- ── Panneau de contrôle ──────────────────────────────────────── -->
<div id="panel">
  <h2>Controler</h2>

  <div class="ctrl">
    <div class="ctrl-hd"><span>Branches</span><span class="v" id="v-branches">3</span></div>
    <input type="range" id="r-branches" min="1" max="10" step="1" value="3">
  </div>

  <div class="ctrl">
    <div class="ctrl-hd"><span>Rayon</span><span class="v" id="v-radius">5.0</span></div>
    <input type="range" id="r-radius" min="0.5" max="20" step="0.5" value="5">
  </div>

  <div class="ctrl">
    <div class="ctrl-hd"><span>Spin</span><span class="v" id="v-spin">1.0</span></div>
    <input type="range" id="r-spin" min="-5" max="5" step="0.1" value="1.0">
  </div>

  <div class="ctrl">
    <div class="ctrl-hd"><span>Aléatoire</span><span class="v" id="v-rand">0.30</span></div>
    <input type="range" id="r-rand" min="0" max="2" step="0.01" value="0.3">
  </div>

  <div class="ctrl">
    <div class="ctrl-hd"><span>Particules</span><span class="v" id="v-count">80k</span></div>
    <input type="range" id="r-count" min="1000" max="200000" step="1000" value="80000">
  </div>

  <hr class="sep">

  <div class="ctrl">
    <div class="ctrl-hd" style="margin-bottom:7px"><span>Dégradé de couleurs</span></div>
    <div class="colors">
      <div class="color-field">
        <label>Centre</label>
        <input type="color" id="c-inside" value="#ff6030">
      </div>
      <div class="color-field">
        <label>Bord</label>
        <input type="color" id="c-outside" value="#1b3aaa">
      </div>
    </div>
  </div>

  <p id="hint">Clic + glisser pour orbiter · Molette pour zoomer</p>
</div>

<!-- ── Imports Three.js ─────────────────────────────────────────── -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module" src="src/main.js"></script>

</body>
</html>
